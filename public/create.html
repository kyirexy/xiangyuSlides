<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建演示文稿 - Xiangyu Slides</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        /* 页面特定样式 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 180px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        /* Hero */
        .hero {
            text-align: center;
            margin-bottom: 40px;
        }

        .hero h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* 快捷分类 */
        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 32px;
            max-width: 600px;
        }

        .quick-action {
            padding: 10px 18px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 24px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .quick-action:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-color: var(--text-tertiary);
        }

        .quick-action.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .quick-action i {
            font-size: 1rem;
        }

        /* 底部输入框 - Chat 风格 */
        .input-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 24px 24px;
            background: linear-gradient(transparent, var(--bg-primary) 30%);
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .input-wrapper {
            width: 100%;
            max-width: 720px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: var(--shadow-lg), 0 0 0 2px rgba(14, 165, 233, 0.15);
        }

        .input-inner {
            padding: 14px 16px;
        }

        .input-inner textarea {
            width: 100%;
            padding: 8px 0;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 24px;
            max-height: 150px;
            line-height: 1.5;
        }

        .input-inner textarea::placeholder {
            color: var(--text-tertiary);
        }

        .input-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-top: 1px solid var(--border);
            gap: 12px;
        }

        .input-hint {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .input-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 风格选择器 */
        .style-selector {
            display: flex;
            gap: 6px;
        }

        .style-btn {
            padding: 6px 12px;
            background: var(--bg-secondary);
            border: 1px solid transparent;
            border-radius: 8px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .style-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .style-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* 发送按钮 */
        .send-btn {
            width: 38px;
            height: 38px;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: var(--bg-tertiary);
            color: var(--text-tertiary);
            cursor: not-allowed;
        }

        .send-btn i {
            font-size: 1.1rem;
        }

        /* 结果区域 */
        .result-area {
            margin-bottom: 80px;
            width: 100%;
            max-width: 720px;
        }

        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .result-title {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
        }

        .result-title i {
            color: var(--primary);
            font-size: 1.2rem;
        }

        .result-btns {
            display: flex;
            gap: 8px;
        }

        .result-btn {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .result-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .result-btn.primary {
            background: var(--primary);
            color: white;
        }

        .result-btn.primary:hover {
            background: var(--primary-dark);
        }

        /* 加载状态 */
        .loading {
            padding: 48px;
            text-align: center;
        }

        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: var(--text-secondary);
        }

        .error-msg {
            padding: 40px;
            text-align: center;
            color: #f87171;
        }

        /* 移动端适配 */
        @media (max-width: 640px) {
            .hero h1 { font-size: 1.8rem; }
            .input-container { padding: 12px 16px 20px; }
            .quick-actions { gap: 8px; }
            .quick-action { padding: 8px 14px; font-size: 0.8rem; }
            .style-selector { display: none; }
            .input-hint { display: none; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="/" class="logo">
                <div class="logo-icon">X</div>
                <div class="logo-text">Xiangyu<span>Slides</span></div>
            </a>
            <div class="nav-pills">
                <a href="/" class="nav-pill">
                    <i class="ph ph-house"></i>
                    首页
                </a>
                <a href="/create.html" class="nav-pill active">
                    <i class="ph ph-plus-circle"></i>
                    创建
                </a>
            </div>
        </div>
        <div class="header-right">
            <button class="theme-toggle" id="themeToggle" title="切换主题">
                <i class="ph ph-moon"></i>
                <i class="ph ph-sun"></i>
            </button>
            <a href="https://github.com/kyirexy/xiangyu-skill" target="_blank" class="nav-pill nav-pill-github">
                <i class="ph ph-github-logo"></i>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="hero">
            <h1>AI 演示文稿生成器</h1>
            <p>描述你想要的内容，AI 帮你快速创建专业演示文稿</p>
        </div>

        <div class="quick-actions" id="purposeArea">
            <button class="quick-action active" data-val="teaching">
                <i class="ph ph-graduation-cap"></i> 教学培训
            </button>
            <button class="quick-action" data-val="pitch">
                <i class="ph ph-currency-dollar"></i> 融资演讲
            </button>
            <button class="quick-action" data-val="product">
                <i class="ph ph-rocket-launch"></i> 产品发布
            </button>
            <button class="quick-action" data-val="meeting">
                <i class="ph ph-chart-bar"></i> 会议汇报
            </button>
            <button class="quick-action" data-val="company">
                <i class="ph ph-buildings"></i> 公司介绍
            </button>
            <button class="quick-action" data-val="tech">
                <i class="ph ph-code"></i> 技术分享
            </button>
            <button class="quick-action" data-val="personal">
                <i class="ph ph-user"></i> 个人简历
            </button>
            <button class="quick-action" data-val="story">
                <i class="ph ph-book-open"></i> 故事讲解
            </button>
        </div>

        <div class="result-area" id="resultArea"></div>
    </main>

    <div class="input-container">
        <div class="input-wrapper">
            <div class="input-inner">
                <textarea id="userInput" placeholder="描述你想要创建的演示文稿..." rows="1"></textarea>
            </div>
            <div class="input-footer">
                <span class="input-hint">
                    <i class="ph ph-enter"></i> Enter 发送 · Shift+Enter 换行
                </span>
                <div class="input-actions">
                    <div class="style-selector" id="styleArea">
                        <button class="style-btn active" data-val="bold-signal">大胆</button>
                        <button class="style-btn" data-val="electric-studio">炫彩</button>
                        <button class="style-btn" data-val="dark-botanical">森系</button>
                        <button class="style-btn" data-val="neon-cyber">赛博</button>
                    </div>
                    <button class="send-btn" id="btnSend" disabled>
                        <i class="ph ph-paper-plane-tilt"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 主题切换
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        // 读取主题设置
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);

        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        });

        // 输入逻辑
        const userInput = document.getElementById('userInput');
        const btnSend = document.getElementById('btnSend');
        const resultArea = document.getElementById('resultArea');

        let config = { purpose: 'teaching', style: 'bold-signal' };

        // 输入框自适应
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
            btnSend.disabled = !this.value.trim();
        });

        // 选择类型
        document.getElementById('purposeArea').addEventListener('click', function(e) {
            if (e.target.closest('.quick-action')) {
                const btn = e.target.closest('.quick-action');
                this.querySelectorAll('.quick-action').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                config.purpose = btn.dataset.val;
            }
        });

        // 选择风格
        document.getElementById('styleArea').addEventListener('click', function(e) {
            if (e.target.classList.contains('style-btn')) {
                this.querySelectorAll('.style-btn').forEach(c => c.classList.remove('active'));
                e.target.classList.add('active');
                config.style = e.target.dataset.val;
            }
        });

        // 发送
        async function send() {
            const topic = userInput.value.trim();
            if (!topic) return;

            userInput.value = '';
            userInput.style.height = 'auto';
            btnSend.disabled = true;

            resultArea.innerHTML = `
                <div class="result-card">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>正在生成演示文稿...</p>
                    </div>
                </div>
            `;

            setTimeout(() => {
                resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic, ...config })
                });
                const data = await res.json();

                if (data.success) {
                    showResult(data);
                } else {
                    resultArea.innerHTML = `<div class="result-card"><div class="error-msg">生成失败: ${data.error}</div></div>`;
                }
            } catch (e) {
                resultArea.innerHTML = `<div class="result-card"><div class="error-msg">请求失败，请稍后重试</div></div>`;
            }
        }

        function showResult(data) {
            window.generatedHTML = data.html;
            resultArea.innerHTML = `
                <div class="result-card">
                    <div class="result-header">
                        <div class="result-title">
                            <i class="ph ph-file-html"></i>
                            ${data.outline.title}
                        </div>
                        <div class="result-btns">
                            <button class="result-btn" onclick="preview()">
                                <i class="ph ph-eye"></i> 预览
                            </button>
                            <button class="result-btn primary" onclick="download()">
                                <i class="ph ph-download-simple"></i> 下载
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function download() {
            const blob = new Blob([window.generatedHTML], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'presentation.html';
            a.click();
        }

        function preview() {
            const blob = new Blob([window.generatedHTML], { type: 'text/html' });
            window.open(URL.createObjectURL(blob), '_blank');
        }

        btnSend.addEventListener('click', send);
        userInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });
    </script>
</body>
</html>
