<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>演示稿预览 - Xiangyu Slides</title>
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        :root {
            --shell-bg: linear-gradient(180deg, #0b1220 0%, #101828 100%);
            --shell-card: rgba(15, 23, 42, 0.78);
            --shell-border: rgba(148, 163, 184, 0.22);
            --shell-text: #f8fafc;
            --shell-muted: #94a3b8;
            --shell-accent: #38bdf8;
            --shell-accent-2: #22c55e;
            --shell-danger: #fb7185;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: var(--shell-bg);
            color: var(--shell-text);
            font-family: "Segoe UI", "PingFang SC", sans-serif;
            overflow-x: hidden;
        }

        .toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            padding: 0 18px;
            display: none;
            align-items: center;
            justify-content: space-between;
            background: rgba(2, 6, 23, 0.88);
            border-bottom: 1px solid rgba(148, 163, 184, 0.16);
            backdrop-filter: blur(18px);
            z-index: 30;
        }

        .toolbar-title {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .toolbar-title h1 {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .id-badge {
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(56, 189, 248, 0.14);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: #bae6fd;
            font-family: Consolas, monospace;
            font-size: 12px;
        }

        .toolbar-actions {
            display: flex;
            gap: 10px;
        }

        .toolbar-btn {
            padding: 9px 14px;
            border: 1px solid rgba(148, 163, 184, 0.24);
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.7);
            color: var(--shell-text);
            cursor: pointer;
            font-size: 13px;
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        }

        .toolbar-btn:hover {
            transform: translateY(-1px);
            border-color: rgba(56, 189, 248, 0.45);
            background: rgba(30, 41, 59, 0.88);
        }

        .toolbar-btn.primary {
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            border: none;
        }

        .shell-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
        }

        .shell-card {
            width: min(760px, 100%);
            background: var(--shell-card);
            border: 1px solid var(--shell-border);
            border-radius: 24px;
            box-shadow: 0 28px 90px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(18px);
            padding: 32px;
        }

        .shell-card h2 {
            font-size: clamp(26px, 4vw, 34px);
            margin-bottom: 10px;
        }

        .shell-card p {
            color: var(--shell-muted);
            line-height: 1.6;
        }

        .shell-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 18px 0 24px;
        }

        .shell-pill {
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.86);
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: var(--shell-muted);
            font-size: 13px;
        }

        .loading-progress {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(148, 163, 184, 0.12);
            margin: 24px 0 14px;
        }

        .loading-progress-bar {
            height: 100%;
            width: 0;
            border-radius: inherit;
            background: linear-gradient(90deg, #38bdf8 0%, #22c55e 100%);
            transition: width 0.35s ease;
        }

        .loading-steps {
            display: grid;
            gap: 12px;
            margin-top: 24px;
        }

        .loading-step {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.68);
            border: 1px solid rgba(148, 163, 184, 0.14);
            opacity: 0.55;
            transition: opacity 0.25s ease, border-color 0.25s ease, transform 0.25s ease;
        }

        .loading-step span {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            background: rgba(30, 41, 59, 0.92);
            color: var(--shell-muted);
        }

        .loading-step strong {
            display: block;
            margin-bottom: 3px;
            font-size: 14px;
        }

        .loading-step small {
            color: var(--shell-muted);
            font-size: 12px;
        }

        .loading-step.active,
        .loading-step.completed {
            opacity: 1;
            transform: translateY(-1px);
        }

        .loading-step.active {
            border-color: rgba(56, 189, 248, 0.45);
        }

        .loading-step.active span {
            background: rgba(14, 165, 233, 0.22);
            color: #e0f2fe;
        }

        .loading-step.completed {
            border-color: rgba(34, 197, 94, 0.36);
        }

        .loading-step.completed span {
            background: rgba(34, 197, 94, 0.18);
            color: #dcfce7;
        }

        .error-screen {
            display: none;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 32px;
        }

        .error-card {
            width: min(520px, 100%);
            padding: 28px;
            border-radius: 22px;
            background: rgba(15, 23, 42, 0.82);
            border: 1px solid rgba(251, 113, 133, 0.28);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
            text-align: center;
        }

        .error-card h2 {
            color: #fecdd3;
            margin-bottom: 10px;
        }

        .error-card p {
            color: var(--shell-muted);
            margin-bottom: 20px;
        }

        #preview-frame {
            display: none;
            width: 100%;
            max-width: 100%;
            height: calc(100vh - 56px);
            margin-top: 56px;
            border: none;
            background: #ffffff;
        }

        @media (max-width: 720px) {
            .toolbar {
                height: auto;
                min-height: 56px;
                padding: 12px;
                align-items: flex-start;
                flex-direction: column;
                gap: 12px;
            }

            .toolbar-actions {
                width: 100%;
                flex-wrap: wrap;
            }

            .toolbar-btn {
                flex: 1 1 140px;
            }

            #preview-frame {
                height: calc(100vh - 112px);
                margin-top: 112px;
            }

            .shell-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="toolbar" id="toolbar">
        <div class="toolbar-title">
            <h1 id="toolbarTitle">演示稿</h1>
            <span class="id-badge" id="toolbarId">--</span>
        </div>
        <div class="toolbar-actions">
            <button class="toolbar-btn" id="copyLinkBtn" onclick="copyLink()">复制链接</button>
            <button class="toolbar-btn" id="downloadHtmlBtn" onclick="downloadHtml()">下载 HTML</button>
            <button class="toolbar-btn primary" id="openRawHtmlBtn" onclick="openRawHtml()">打开原始 HTML</button>
        </div>
    </div>

    <section class="shell-screen" id="loading">
        <div class="shell-card">
            <h2 id="loadingTitle">演示稿正在生成</h2>
            <p id="loadingMessage">正在等待创建页开始生成任务...</p>
            <div class="shell-meta">
                <span class="shell-pill" id="loadingRoutePill">访问地址已固定</span>
                <span class="shell-pill">ID: <strong id="loadingId">--</strong></span>
            </div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgress"></div>
            </div>
            <div class="loading-steps" id="loadingSteps"></div>
        </div>
    </section>

    <section class="error-screen" id="error">
        <div class="error-card">
            <h2 id="errorTitle">无法打开演示稿</h2>
            <p id="errorMessage">这份演示稿可能还没有生成成功，或者链接已经失效。</p>
            <button class="toolbar-btn primary" id="retryLoadBtn" onclick="retryLoadPresentation()">重新加载</button>
        </div>
    </section>

    <iframe id="preview-frame"></iframe>

    <script src="/js/common.js"></script>
    <script src="/js/presentation-viewer.js"></script>
</body>
</html>
