<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>演示预览 - Xiangyu Slides</title>
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        :root {
            --preview-bg:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.16), transparent 28%),
                radial-gradient(circle at top right, rgba(249, 115, 22, 0.14), transparent 18%),
                linear-gradient(180deg, #0b1220 0%, #0f172a 100%);
            --preview-surface: rgba(15, 23, 42, 0.78);
            --preview-panel: rgba(15, 23, 42, 0.72);
            --preview-border: rgba(148, 163, 184, 0.18);
            --preview-border-strong: rgba(148, 163, 184, 0.26);
            --preview-text: #f8fafc;
            --preview-muted: #94a3b8;
            --preview-blue: #38bdf8;
            --preview-green: #22c55e;
            --preview-danger: #fb7185;
            --preview-shadow: 0 24px 80px rgba(2, 6, 23, 0.32);
            --preview-header-height: 68px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--preview-bg);
            color: var(--preview-text);
            font-family: "PingFang SC", "Microsoft YaHei", "SF Pro Text", "Segoe UI", sans-serif;
            overflow: hidden;
        }

        button {
            font: inherit;
            cursor: pointer;
        }

        .preview-app {
            min-height: 100vh;
            display: grid;
            grid-template-rows: var(--preview-header-height) 1fr;
        }

        .toolbar {
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 0 20px;
            background: rgba(2, 6, 23, 0.82);
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
            backdrop-filter: blur(18px);
        }

        .toolbar-title {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .toolbar-mark {
            width: 34px;
            height: 34px;
            border-radius: 999px;
            overflow: hidden;
            flex: 0 0 auto;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.24);
        }

        .toolbar-mark img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .toolbar-copy {
            display: grid;
            gap: 2px;
            min-width: 0;
        }

        .toolbar-copy h1 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .toolbar-copy p {
            margin: 0;
            color: var(--preview-muted);
            font-size: 12px;
        }

        .toolbar-meta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .toolbar-pill {
            min-height: 32px;
            padding: 0 12px;
            border-radius: 999px;
            border: 1px solid var(--preview-border);
            background: rgba(15, 23, 42, 0.74);
            color: var(--preview-muted);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .toolbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .toolbar-btn {
            min-height: 38px;
            padding: 0 14px;
            border-radius: 12px;
            border: 1px solid var(--preview-border);
            background: rgba(15, 23, 42, 0.7);
            color: var(--preview-text);
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        }

        .toolbar-btn:hover {
            transform: translateY(-1px);
            border-color: var(--preview-border-strong);
            background: rgba(30, 41, 59, 0.88);
        }

        .toolbar-btn.primary {
            border: none;
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
        }

        .preview-workspace {
            position: relative;
            min-height: 0;
            padding: 18px;
        }

        .preview-stage {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 0;
            border-radius: 26px;
            border: 1px solid var(--preview-border);
            background: rgba(255, 255, 255, 0.02);
            box-shadow: var(--preview-shadow);
            overflow: hidden;
            backdrop-filter: blur(18px);
        }

        .shell-screen,
        .error-screen {
            min-height: 100%;
            display: grid;
            place-items: center;
            padding: 28px;
        }

        .shell-card,
        .error-card {
            width: min(820px, 100%);
            border-radius: 28px;
            border: 1px solid var(--preview-border);
            background: var(--preview-surface);
            box-shadow: var(--preview-shadow);
            backdrop-filter: blur(18px);
            padding: 28px;
        }

        .error-card {
            width: min(520px, 100%);
            border-color: rgba(251, 113, 133, 0.24);
        }

        .shell-kicker {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 0 12px;
            border-radius: 999px;
            background: rgba(56, 189, 248, 0.12);
            color: #bae6fd;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .shell-card h2,
        .error-card h2 {
            margin: 16px 0 10px;
            font-size: clamp(28px, 4.4vw, 42px);
            line-height: 1.02;
        }

        .shell-card p,
        .error-card p {
            margin: 0;
            color: var(--preview-muted);
            line-height: 1.7;
        }

        .shell-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 18px 0 0;
        }

        .shell-meta .toolbar-pill strong {
            color: var(--preview-text);
            margin-left: 6px;
        }

        .loading-progress {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(148, 163, 184, 0.12);
            margin: 22px 0 14px;
        }

        .loading-progress-bar {
            height: 100%;
            width: 0;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--preview-blue) 0%, var(--preview-green) 100%);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            transition: width 0.32s ease;
        }

        .loading-steps {
            display: grid;
            gap: 12px;
            margin-top: 22px;
        }

        .loading-step {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.1);
            opacity: 0.56;
            transition: opacity 0.24s ease, transform 0.24s ease, border-color 0.24s ease;
        }

        .loading-step span {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(30, 41, 59, 0.9);
            color: var(--preview-muted);
            font-weight: 700;
            flex: 0 0 auto;
        }

        .loading-step strong {
            display: block;
            margin-bottom: 3px;
            font-size: 14px;
        }

        .loading-step small {
            color: var(--preview-muted);
            font-size: 12px;
        }

        .loading-step.active,
        .loading-step.completed {
            opacity: 1;
            transform: translateY(-1px);
        }

        .loading-step.active {
            border-color: rgba(56, 189, 248, 0.4);
        }

        .loading-step.active span {
            color: #e0f2fe;
            background: rgba(14, 165, 233, 0.16);
        }

        .loading-step.completed {
            border-color: rgba(34, 197, 94, 0.34);
        }

        .loading-step.completed span {
            color: #dcfce7;
            background: rgba(34, 197, 94, 0.16);
        }

        #preview-frame {
            display: none;
            width: 100%;
            height: 100%;
            border: 0;
            background: #ffffff;
        }

        .error-screen {
            display: none;
        }

        @media (max-width: 900px) {
            .toolbar {
                padding: 12px 14px;
                height: auto;
                min-height: var(--preview-header-height);
                align-items: flex-start;
                flex-direction: column;
            }

            .toolbar-actions {
                width: 100%;
                justify-content: flex-start;
            }

            .preview-app {
                grid-template-rows: auto 1fr;
            }

            .preview-workspace {
                padding: 12px;
            }
        }

        @media (max-width: 640px) {
            .toolbar-actions {
                width: 100%;
            }

            .toolbar-btn {
                flex: 1 1 calc(50% - 10px);
            }

            .shell-card,
            .error-card {
                padding: 22px;
            }

            .preview-stage {
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="preview-app">
        <header class="toolbar" id="toolbar">
            <div class="toolbar-title">
                <div class="toolbar-mark">
                    <img src="/tubiao.jpg" alt="Xiangyu Slides">
                </div>
                <div class="toolbar-copy">
                    <h1 id="toolbarTitle">演示预览</h1>
                    <p id="toolbarSubtitle">Runtime-first preview shell</p>
                </div>
                <div class="toolbar-meta">
                    <span class="toolbar-pill" id="toolbarId">--</span>
                    <span class="toolbar-pill" id="toolbarStatus">Preparing</span>
                </div>
            </div>
            <div class="toolbar-actions">
                <button class="toolbar-btn" id="copyLinkBtn" type="button">复制链接</button>
                <button class="toolbar-btn" id="downloadHtmlBtn" type="button">下载 HTML</button>
                <button class="toolbar-btn" id="downloadPptxBtn" type="button">下载 PPTX</button>
                <button class="toolbar-btn primary" id="openRawHtmlBtn" type="button">打开原始 HTML</button>
            </div>
        </header>

        <main class="preview-workspace">
            <div class="preview-stage">
                <section class="shell-screen" id="loading">
                    <div class="shell-card">
                        <span class="shell-kicker" id="loadingKicker">Preview</span>
                        <h2 id="loadingTitle">演示正在生成</h2>
                        <p id="loadingMessage">正在准备可预览内容...</p>
                        <div class="shell-meta">
                            <span class="toolbar-pill" id="loadingRoutePill">访问地址已固定</span>
                            <span class="toolbar-pill">ID <strong id="loadingId">--</strong></span>
                        </div>
                        <div class="loading-progress">
                            <div class="loading-progress-bar" id="loadingProgress"></div>
                        </div>
                        <div class="loading-steps" id="loadingSteps"></div>
                    </div>
                </section>

                <section class="error-screen" id="error">
                    <div class="error-card">
                        <span class="shell-kicker">Error</span>
                        <h2 id="errorTitle">无法打开演示</h2>
                        <p id="errorMessage">这份演示可能还没有生成完成，或者链接已经失效。</p>
                        <div class="shell-meta">
                            <button class="toolbar-btn primary" id="retryLoadBtn" type="button">重新加载</button>
                        </div>
                    </div>
                </section>

                <iframe id="preview-frame" title="Presentation Preview"></iframe>
            </div>
        </main>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/presentation-viewer.js"></script>
</body>
</html>
